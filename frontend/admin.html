<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Amax Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #05050A; color: white; }
    .glass-card { background: rgba(15, 15, 25, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.2); }
    .btn-primary { background: linear-gradient(95deg, #8B5CF6, #A855F7); }
    #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
    .toast { min-width: 300px; padding: 16px; border-radius: 1rem; background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(139, 92, 246, 0.3); color: white; transform: translateX(120%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .toast.show { transform: translateX(0); }
  </style>
</head>
<body class="p-6 md:p-12">
  <div id="toast-container"></div>

  <!-- ADMIN LOGIN MODAL -->
  <div id="adminAuthModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md px-6">
    <div class="glass-card w-full max-w-md p-10 rounded-3xl">
      <h2 class="text-3xl font-bold mb-8 text-center bg-gradient-to-r from-purple-400 to-white bg-clip-text text-transparent">Admin Access</h2>
      <form id="adminLoginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2">Admin ID</label>
          <input type="text" id="adminId" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500" placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Admin Password</label>
          <input type="password" id="adminPass" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-purple-500" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full py-4 rounded-full font-bold text-white btn-primary">Verify Identity</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD CONTENT -->
  <div id="dashboardContent" class="hidden max-w-7xl mx-auto">
    <header class="flex justify-between items-center mb-12">
      <div>
        <h1 class="text-4xl font-bold font-heading">User Records</h1>
        <p class="text-gray-400 mt-2">Managing the Amax Portfolio database</p>
      </div>
      <button id="adminLogout" class="px-6 py-2 rounded-full border border-red-500/50 text-red-400 hover:bg-red-500/10 transition">Logout Dashboard</button>
    </header>

    <div class="glass-card rounded-3xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-white/5 border-b border-white/10">
            <tr>
              <th class="px-8 py-5 text-sm font-semibold">User Name</th>
              <th class="px-8 py-5 text-sm font-semibold">Email Address</th>
              <th class="px-8 py-5 text-sm font-semibold">Joined Date</th>
              <th class="px-8 py-5 text-sm font-semibold">Action</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- User rows will be injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- LOGOUT CONFIRMATION MODAL -->
  <div id="logoutModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center bg-black/80 backdrop-blur-sm px-6">
    <div class="glass-card w-full max-w-sm p-8 relative text-center rounded-3xl">
      <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-sign-out-alt text-3xl"></i>
      </div>
      <h2 class="text-2xl font-bold mb-2">Logout Dashboard?</h2>
      <p class="text-gray-400 mb-8">You will need to verify your identity again to access the admin panel.</p>
      <div class="flex gap-4">
        <button id="cancelLogout" class="flex-1 py-3 rounded-full font-bold border border-white/10 hover:bg-white/5 transition text-gray-300">Cancel</button>
        <button id="confirmLogout" class="flex-1 py-3 rounded-full font-bold bg-red-500 hover:bg-red-600 transition text-white">Logout</button>
      </div>
    </div>
  </div>

  <script>
    const showToast = (message, type = 'info') => {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
    };

    const API_URL = 'https://amax-backend.onrender.com';
    const adminAuthModal = document.getElementById('adminAuthModal');
    const dashboardContent = document.getElementById('dashboardContent');
    const userTableBody = document.getElementById('userTableBody');
    const logoutModal = document.getElementById('logoutModal');

    const showLogoutModal = () => logoutModal.classList.remove('hidden');
    const hideLogoutModal = () => logoutModal.classList.add('hidden');

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('adminId').value;
      const password = document.getElementById('adminPass').value;

      try {
        const response = await fetch(`${API_URL}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, password })
        });
        
        const contentType = response.headers.get("content-type");
        let result;
        if (contentType && contentType.indexOf("application/json") !== -1) {
          result = await response.json();
        } else {
          result = { error: await response.text() };
        }

        if (response.ok) {
          localStorage.setItem('isAdmin', 'true');
          adminAuthModal.classList.add('hidden');
          dashboardContent.classList.remove('hidden');
          loadUsers();
          showToast('Welcome back, Admin!', 'success');
        } else {
          showToast(result.error || 'Access Denied', 'error');
        }
      } catch (err) {
        console.error('Login error:', err);
        showToast('Connection failed. Make sure server is running.', 'error');
      }
    });

    const loadUsers = async () => {
      try {
        const response = await fetch(`${API_URL}/api/admin/users`);
        const users = await response.json();
        userTableBody.innerHTML = '';
        users.forEach(user => {
          const row = document.createElement('tr');
          row.className = 'border-b border-white/5 hover:bg-white/5 transition';
          row.innerHTML = `
            <td class="px-8 py-4 font-medium">${user.name}</td>
            <td class="px-8 py-4 text-gray-400">${user.email}</td>
            <td class="px-8 py-4 text-gray-400">${new Date(user.createdAt).toLocaleDateString()}</td>
            <td class="px-8 py-4"><button class="text-purple-400 hover:text-purple-300">Details</button></td>
          `;
          userTableBody.appendChild(row);
        });
      } catch (err) {
        showToast('Failed to load user records', 'error');
      }
    };

    document.getElementById('adminLogout').addEventListener('click', showLogoutModal);
    document.getElementById('cancelLogout').addEventListener('click', hideLogoutModal);
    document.getElementById('confirmLogout').addEventListener('click', () => {
      localStorage.removeItem('isAdmin');
      location.reload();
    });

    // Persistent login
    if (localStorage.getItem('isAdmin') === 'true') {
      adminAuthModal.classList.add('hidden');
      dashboardContent.classList.remove('hidden');
      loadUsers();
    }
  </script>
</body>
</html>
