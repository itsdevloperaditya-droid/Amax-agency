<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Join Amax | Worker Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: #05050A; color: #e5e7eb; }
    h1, h2, h3 { font-family: 'Poppins', sans-serif; }
    .bg-gradient-animate {
      background: linear-gradient(-45deg, #05050A, #0f0f1a, #1a0b2e, #05050A);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .btn-primary { background: linear-gradient(95deg, #8B5CF6, #A855F7); transition: all 0.3s ease; }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(139, 92, 246, 0.6); transform: scale(1.02); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .input-field {
      width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
      color: white; border-radius: 1rem; padding: 0.9rem 1rem; outline: none; transition: all 0.3s;
    }
    .input-field:focus { border-color: #8B5CF6; background: rgba(139, 92, 246, 0.05); }
    .input-error { border-color: #ef4444 !important; }
    .error-msg { color: #ef4444; font-size: 0.75rem; margin-top: 0.3rem; display: none; }
    .error-msg.visible { display: block; }
    .tab-btn { transition: all 0.3s; border-bottom: 2px solid transparent; }
    .tab-btn.active { border-bottom-color: #8B5CF6; color: #8B5CF6; }
    .animate-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .toast { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); padding: 0.75rem 1.5rem; border-radius: 1rem; font-size: 0.85rem; font-weight: 600; z-index: 999; animation: toastIn 0.3s ease-out; }
    .toast-success { background: #065f46; color: #6ee7b7; border: 1px solid #059669; }
    .toast-error { background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .glass-card {
      background: rgba(15, 15, 25, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 2rem;
    }
  </style>
</head>
<body class="bg-gradient-animate min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md animate-in">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-2 mb-4">
        <i class="fas fa-film text-purple-500 text-2xl"></i>
        <span class="font-bold text-2xl bg-gradient-to-r from-white via-purple-200 to-purple-400 bg-clip-text text-transparent">Amax</span>
      </div>
      <p class="text-gray-400 text-sm">Join our creative team</p>
    </div>

    <div class="glass-card p-6 shadow-2xl">
      <div class="flex border-b border-white/10 mb-6">
        <button id="tabLogin" class="tab-btn active flex-1 py-3 text-center font-semibold text-sm" onclick="switchTab('login')">Login</button>
        <button id="tabSignup" class="tab-btn flex-1 py-3 text-center font-semibold text-sm text-gray-500" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="space-y-4" onsubmit="handleLogin(event)">
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">Email</label>
          <input type="email" id="loginEmail" class="input-field" placeholder="you@example.com" required>
        </div>
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">Password</label>
          <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required>
        </div>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" id="loginBtn" class="btn-primary py-3 rounded-xl font-bold text-white w-full">Login</button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="space-y-4 hidden" onsubmit="handleSignup(event)">
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">Full Name <span class="text-red-400">*</span></label>
          <input type="text" id="signupName" class="input-field" placeholder="Rahul Sharma" required>
        </div>
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">Email <span class="text-red-400">*</span></label>
          <input type="email" id="signupEmail" class="input-field" placeholder="you@example.com" required>
        </div>
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">WhatsApp Number <span class="text-gray-500 text-xs">(Optional)</span></label>
          <input type="text" id="signupWhatsapp" class="input-field" placeholder="+91 98765 43210">
        </div>
        <div>
          <label class="block text-xs font-bold text-purple-400 mb-1 uppercase tracking-wider">Password <span class="text-red-400">*</span></label>
          <input type="password" id="signupPassword" class="input-field" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="error-msg" id="signupError"></div>
        <button type="submit" id="signupBtn" class="btn-primary py-3 rounded-xl font-bold text-white w-full">Create Account</button>
      </form>
    </div>

    <p class="text-center text-gray-500 text-xs mt-6">
      <a href="index.html" class="hover:text-purple-400 transition">← Back to Home</a>
    </p>
  </div>

  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabSignup = document.getElementById('tabSignup');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabLogin.classList.remove('text-gray-500');
        tabSignup.classList.remove('active');
        tabSignup.classList.add('text-gray-500');
      } else {
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        tabSignup.classList.add('active');
        tabSignup.classList.remove('text-gray-500');
        tabLogin.classList.remove('active');
        tabLogin.classList.add('text-gray-500');
      }
      clearErrors();
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearErrors() {
      document.querySelectorAll('.error-msg.visible').forEach(el => el.classList.remove('visible'));
    }

    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function setBtnLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Processing...';
      } else {
        btn.disabled = false;
      }
    }

    function getWorkers() {
      try { return JSON.parse(localStorage.getItem('amax_workers') || '[]'); }
      catch { return []; }
    }

    function saveWorkers(workers) {
      localStorage.setItem('amax_workers', JSON.stringify(workers));
    }

    function getUsers() {
      try { return JSON.parse(localStorage.getItem('amax_users') || '[]'); }
      catch { return []; }
    }

    function saveUsers(users) {
      localStorage.setItem('amax_users', JSON.stringify(users));
    }

    async function handleSignup(e) {
      e.preventDefault();
      clearErrors();

      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const whatsapp = document.getElementById('signupWhatsapp').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!name || !email || !password) {
        showError('signupError', 'Please fill all required fields');
        return;
      }
      if (password.length < 6) {
        showError('signupError', 'Password must be at least 6 characters');
        return;
      }

      setBtnLoading('signupBtn', true);

      // Simulate network delay
      await new Promise(r => setTimeout(r, 500));

      const users = getUsers();
      if (users.find(u => u.email === email)) {
        showError('signupError', 'User already exists');
        setBtnLoading('signupBtn', false);
        return;
      }

      const token = btoa(JSON.stringify({ email, name, whatsapp, ts: Date.now() }));
      localStorage.setItem('amax_token', token);
      localStorage.setItem('amax_user', JSON.stringify({ name, email, whatsapp }));

      showToast('Account created! Redirecting...');
      setTimeout(() => {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect || 'worker-onboarding.html';
      }, 1500);
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('loginError', 'Please fill all fields');
        return;
      }

      setBtnLoading('loginBtn', true);
      await new Promise(r => setTimeout(r, 500));

      const users = getUsers();
      const user = users.find(u => u.email === email);
      if (!user) {
        showError('loginError', 'No account found with this email. Please sign up first.');
        setBtnLoading('loginBtn', false);
        return;
      }

      const token = btoa(JSON.stringify({ email: user.email, name: user.name, whatsapp: user.whatsapp, ts: Date.now() }));
      localStorage.setItem('amax_token', token);
      localStorage.setItem('amax_user', JSON.stringify({ name: user.name, email: user.email, whatsapp: user.whatsapp }));

      showToast('Welcome back! Redirecting...');
      setTimeout(() => {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect || 'worker-onboarding.html';
      }, 1500);
    }

    // Check if already logged in
    (function() {
      const token = localStorage.getItem('amax_token');
      if (token) {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect || 'worker-onboarding.html';
      }
    })();
  </script>
  <script src="chatbot-widget.js"></script>
</body>
</html>
